<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #titlebar {
      height: 38px;
      -webkit-app-region: drag;
      background: #181825;
      display: flex;
      align-items: center;
      padding: 0 80px 0 16px;
      flex-shrink: 0;
    }

    #filename {
      font-size: 13px;
      color: #6c7086;
      user-select: none;
    }

    #filename.modified::after {
      content: ' ●';
      color: #cba6f7;
    }

    #panes {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor-pane {
      width: 50%;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #divider {
      width: 5px;
      background: #313244;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #divider:hover, #divider.dragging {
      background: #cba6f7;
    }

    #pane-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      padding: 6px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      tab-size: 2;
      white-space: pre-wrap;
    }

    #preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #preview-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      padding: 6px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      line-height: 1.7;
    }

    /* Markdown styles */
    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      color: #cba6f7;
      margin: 1.2em 0 0.4em;
      font-weight: 600;
    }
    #preview h1 { font-size: 2em; border-bottom: 1px solid #313244; padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; border-bottom: 1px solid #313244; padding-bottom: 0.2em; }
    #preview p { margin: 0.6em 0; }
    #preview a { color: #89b4fa; }
    #preview code {
      background: #313244;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 0.9em;
    }
    #preview pre {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    #preview pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }
    #preview blockquote {
      border-left: 3px solid #cba6f7;
      margin: 0.8em 0;
      padding: 0.2em 1em;
      color: #a6adc8;
    }
    #preview ul, #preview ol { margin: 0.6em 0; padding-left: 1.6em; }
    #preview li { margin: 0.25em 0; }
    #preview hr { border: none; border-top: 1px solid #313244; margin: 1.2em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    #preview th, #preview td {
      border: 1px solid #313244;
      padding: 6px 12px;
      text-align: left;
    }
    #preview th { background: #181825; color: #cba6f7; }
    #preview img { max-width: 100%; border-radius: 4px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="titlebar">
    <span id="filename">untitled.md</span>
  </div>
  <div id="panes">
    <div id="editor-pane">
      <div id="pane-label">Editor</div>
      <textarea id="editor" spellcheck="false" placeholder="Start writing Markdown…"></textarea>
    </div>
    <div id="divider"></div>
    <div id="preview-pane">
      <div id="preview-label">Preview</div>
      <div id="preview"></div>
    </div>
  </div>

  <script src="node_modules/marked/marked.min.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const filenameEl = document.getElementById('filename');
    let currentPath = null;
    let modified = false;

    marked.setOptions({ breaks: true, gfm: true });

    function render() {
      preview.innerHTML = marked.parse(editor.value);
    }

    function setModified(val) {
      modified = val;
      filenameEl.classList.toggle('modified', val);
    }

    function setPath(p) {
      currentPath = p;
      filenameEl.textContent = p ? p.split('/').pop() : 'untitled.md';
      setModified(false);
    }

    editor.addEventListener('input', () => {
      render();
      setModified(true);
    });

    // IPC handlers
    window.api.onFileNew(() => {
      editor.value = '';
      render();
      setPath(null);
    });

    window.api.onFileOpened(({ path, content }) => {
      editor.value = content;
      render();
      setPath(path);
    });

    window.api.onFileSave(async () => {
      const result = await window.api.saveFile(editor.value, false);
      if (result.saved) setPath(result.path);
    });

    window.api.onFileSaveAs(async () => {
      const result = await window.api.saveFile(editor.value, true);
      if (result.saved) setPath(result.path);
    });

    // Divider drag
    const divider = document.getElementById('divider');
    const editorPane = document.getElementById('editor-pane');
    const panes = document.getElementById('panes');

    divider.addEventListener('mousedown', (e) => {
      e.preventDefault();
      divider.classList.add('dragging');
      const startX = e.clientX;
      const startW = editorPane.offsetWidth;
      const totalW = panes.offsetWidth;

      function onMove(e) {
        const delta = e.clientX - startX;
        const newW = Math.min(Math.max(startW + delta, 100), totalW - 105);
        editorPane.style.width = newW + 'px';
      }

      function onUp() {
        divider.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Initial render
    render();
  </script>
</body>
</html>
