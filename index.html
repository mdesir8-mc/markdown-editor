<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --bg2: #181825;
      --surface: #313244;
      --text: #cdd6f4;
      --muted: #6c7086;
      --accent: #cba6f7;
      --link: #89b4fa;
      --dim: #a6adc8;
      --scroll: #45475a;
    }

    body[data-theme="latte"] {
      --bg: #eff1f5;
      --bg2: #e6e9ef;
      --surface: #ccd0da;
      --text: #4c4f69;
      --muted: #8c8fa1;
      --accent: #8839ef;
      --link: #1e66f5;
      --dim: #6c6f85;
      --scroll: #bcc0cc;
    }

    body[data-theme="nord"] {
      --bg: #2e3440;
      --bg2: #272c36;
      --surface: #3b4252;
      --text: #d8dee9;
      --muted: #7b88a1;
      --accent: #88c0d0;
      --link: #81a1c1;
      --dim: #a3acbe;
      --scroll: #4c566a;
    }

    body[data-theme="dracula"] {
      --bg: #282a36;
      --bg2: #21222c;
      --surface: #44475a;
      --text: #f8f8f2;
      --muted: #6272a4;
      --accent: #bd93f9;
      --link: #8be9fd;
      --dim: #b8bcc8;
      --scroll: #44475a;
    }

    body[data-theme="solarized"] {
      --bg: #fdf6e3;
      --bg2: #eee8d5;
      --surface: #d3cbb7;
      --text: #586e75;
      --muted: #93a1a1;
      --accent: #d33682;
      --link: #268bd2;
      --dim: #657b83;
      --scroll: #c9c1ad;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #titlebar {
      height: 38px;
      -webkit-app-region: drag;
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 80px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--surface);
    }

    #filename {
      font-size: 13px;
      color: var(--muted);
      user-select: none;
    }

    #filename.modified::after {
      content: ' ●';
      color: var(--accent);
    }

    #theme-select {
      -webkit-app-region: no-drag;
      background: var(--surface);
      color: var(--text);
      border: none;
      border-radius: 6px;
      font-size: 12px;
      padding: 3px 8px;
      outline: none;
      cursor: pointer;
    }

    #panes {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor-pane {
      width: 50%;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #divider {
      width: 5px;
      background: var(--surface);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #divider:hover, #divider.dragging {
      background: var(--accent);
    }

    #pane-label, #preview-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 6px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--surface);
      flex-shrink: 0;
    }

    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px;
      tab-size: 2;
      white-space: pre-wrap;
    }

    #preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      line-height: 1.7;
    }

    /* Markdown styles */
    #preview h1, #preview h2, #preview h3,
    #preview h4, #preview h5, #preview h6 {
      color: var(--accent);
      margin: 1.2em 0 0.4em;
      font-weight: 600;
    }
    #preview h1 { font-size: 2em; border-bottom: 1px solid var(--surface); padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--surface); padding-bottom: 0.2em; }
    #preview p { margin: 0.6em 0; }
    #preview a { color: var(--link); }
    #preview code {
      background: var(--surface);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 0.9em;
    }
    #preview pre {
      background: var(--bg2);
      border: 1px solid var(--surface);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    #preview pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }
    #preview blockquote {
      border-left: 3px solid var(--accent);
      margin: 0.8em 0;
      padding: 0.2em 1em;
      color: var(--dim);
    }
    #preview ul, #preview ol { margin: 0.6em 0; padding-left: 1.6em; }
    #preview li { margin: 0.25em 0; }
    #preview hr { border: none; border-top: 1px solid var(--surface); margin: 1.2em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    #preview th, #preview td {
      border: 1px solid var(--surface);
      padding: 6px 12px;
      text-align: left;
    }
    #preview th { background: var(--bg2); color: var(--accent); }
    #preview img { max-width: 100%; border-radius: 4px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="titlebar">
    <span id="filename">untitled.md</span>
    <select id="theme-select" title="Theme">
      <option value="mocha">Mocha (dark)</option>
      <option value="dracula">Dracula</option>
      <option value="nord">Nord</option>
      <option value="latte">Latte (light)</option>
      <option value="solarized">Solarized (light)</option>
    </select>
  </div>
  <div id="panes">
    <div id="editor-pane">
      <div id="pane-label">Editor</div>
      <textarea id="editor" spellcheck="false" placeholder="Start writing Markdown…"></textarea>
    </div>
    <div id="divider"></div>
    <div id="preview-pane">
      <div id="preview-label">Preview</div>
      <div id="preview"></div>
    </div>
  </div>

  <script src="node_modules/marked/marked.min.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const filenameEl = document.getElementById('filename');
    const themeSelect = document.getElementById('theme-select');
    let currentPath = null;
    let modified = false;

    marked.setOptions({ breaks: true, gfm: true });

    function render() {
      preview.innerHTML = marked.parse(editor.value);
      preview.querySelectorAll('input[type="checkbox"]').forEach((box, i) => {
        box.removeAttribute('disabled');
        box.style.cursor = 'pointer';
        box.addEventListener('change', () => {
          let count = -1;
          editor.value = editor.value.replace(/^(\s*[-*+]\s+)\[(x| )\]/gim, (match, prefix, state) => {
            count++;
            if (count === i) return prefix + (state === ' ' ? '[x]' : '[ ]');
            return match;
          });
          setModified(true);
          render();
        });
      });
    }

    function setModified(val) {
      modified = val;
      filenameEl.classList.toggle('modified', val);
    }

    function setPath(p) {
      currentPath = p;
      filenameEl.textContent = p ? p.split('/').pop() : 'untitled.md';
      setModified(false);
    }

    editor.addEventListener('input', () => {
      render();
      setModified(true);
    });

    // Theme switching
    function applyTheme(name) {
      if (name === 'mocha') document.body.removeAttribute('data-theme');
      else document.body.setAttribute('data-theme', name);
      themeSelect.value = name;
      localStorage.setItem('theme', name);
    }
    themeSelect.addEventListener('change', () => applyTheme(themeSelect.value));
    applyTheme(localStorage.getItem('theme') || 'mocha');

    // IPC handlers
    window.api.onFileNew(() => {
      editor.value = '';
      render();
      setPath(null);
    });

    window.api.onFileOpened(({ path, content }) => {
      editor.value = content;
      render();
      setPath(path);
    });

    window.api.onFileSave(async () => {
      const result = await window.api.saveFile(editor.value, false);
      if (result.saved) setPath(result.path);
    });

    window.api.onFileSaveAs(async () => {
      const result = await window.api.saveFile(editor.value, true);
      if (result.saved) setPath(result.path);
    });

    // Divider drag
    const divider = document.getElementById('divider');
    const editorPane = document.getElementById('editor-pane');
    const panes = document.getElementById('panes');

    divider.addEventListener('mousedown', (e) => {
      e.preventDefault();
      divider.classList.add('dragging');
      const startX = e.clientX;
      const startW = editorPane.offsetWidth;
      const totalW = panes.offsetWidth;

      function onMove(e) {
        const delta = e.clientX - startX;
        const newW = Math.min(Math.max(startW + delta, 100), totalW - 105);
        editorPane.style.width = newW + 'px';
      }

      function onUp() {
        divider.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Initial render
    render();
  </script>
</body>
</html>
